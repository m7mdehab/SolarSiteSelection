services:
  solarsite:
    build:
      context: .
      dockerfile: Dockerfile
    image: solarsite:latest
    ports:
      - "7860:7860"
    environment:
      # Optional: provide keys to enable live acquisition; the preset demo runs
      # from the baked offline cache without them.
      - OPENTOPO_KEY=${OPENTOPO_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:7860/health', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
