name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install WeasyPrint system libraries
        # WeasyPrint 60+ renders via Pango + FreeType (libpangoft2); it no longer
        # needs Cairo/gdk-pixbuf. Fonts are required or text rendering raises.
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 fonts-dejavu-core fontconfig
      - name: Sync dependencies
        run: uv sync --locked
      - name: Lint
        run: |
          uv run ruff check src tests scripts
          uv run ruff format --check src tests scripts
      - name: Type check
        run: uv run pyright
      - name: Test (offline only — CI never hits live APIs; ≥80% coverage gate)
        run: |
          set -o pipefail
          uv run pytest -m "not live and not slow" --cov --cov-report=term --cov-fail-under=80 -rA --tb=short 2>&1 | tee /tmp/pytest.log
      - name: Surface failures as annotations
        if: failure()
        run: |
          echo "::group::pytest tail"
          tail -n 80 /tmp/pytest.log || true
          echo "::endgroup::"
          grep -nE "FAILED|^E |Error|Exception|assert" /tmp/pytest.log | tail -n 25 | while IFS= read -r line; do
            echo "::error::${line}"
          done

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: |
          set -o pipefail
          docker build -t solarsite:ci . 2>&1 | tee /tmp/build.log
      - name: Surface build failure
        if: failure()
        run: |
          echo "::group::docker build tail"; tail -n 80 /tmp/build.log || true; echo "::endgroup::"
          grep -nE "error|ERROR|failed|Failed|not found|No such|exit code|Cannot|denied" /tmp/build.log | tail -n 25 | while IFS= read -r l; do echo "::error::${l}"; done
      - name: Report image size
        run: |
          SIZE=$(docker image inspect solarsite:ci --format '{{.Size}}')
          echo "Image size: $((SIZE/1024/1024)) MB"
          test "$SIZE" -lt 3221225472  # < 3 GB (plan gate)
      - name: Run container and verify healthcheck + API
        run: |
          docker run -d --name solarsite -p 7860:7860 solarsite:ci
          ok=0
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:7860/health >/dev/null 2>&1; then ok=1; echo "health OK after ${i} tries"; break; fi
            sleep 2
          done
          if [ "$ok" -ne 1 ]; then echo "container did not become healthy"; docker logs solarsite | tail -n 60; exit 1; fi
          curl -fsS http://localhost:7860/health | grep -q '"status":"ok"'
          curl -fsS http://localhost:7860/criteria | grep -q economic
          docker rm -f solarsite
      - name: Surface container logs on failure
        if: failure()
        run: |
          docker logs solarsite 2>&1 | tail -n 60 | while IFS= read -r l; do echo "::error::${l}"; done || true

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint (eslint + tsc)
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Playwright acceptance test
        run: npx playwright test
