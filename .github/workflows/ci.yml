name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Sync dependencies
        run: uv sync --locked
      - name: Lint
        run: |
          uv run ruff check src tests scripts
          uv run ruff format --check src tests scripts
      - name: Type check
        run: uv run pyright
      - name: Test (offline only — CI never hits live APIs)
        run: uv run pytest -m "not live and not slow" --cov --cov-report=term
