name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install WeasyPrint system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev libcairo2
      - name: Sync dependencies
        run: uv sync --locked
      - name: Lint
        run: |
          uv run ruff check src tests scripts
          uv run ruff format --check src tests scripts
      - name: Type check
        run: uv run pyright
      - name: Test (offline only — CI never hits live APIs)
        run: uv run pytest -m "not live and not slow" --cov --cov-report=term
